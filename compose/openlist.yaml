services:
  openlist:
    image: 'openlistteam/openlist:latest'
    container_name: openlist
    user: '0:0'
    volumes:
      - '/vol1/1000/Docker/openlist/data:/opt/openlist/data'
      - '/vol1/1000:/fnOS'
    ports:
      - '5244:5244'
    environment:
      - UMASK=022
    restart: unless-stopped